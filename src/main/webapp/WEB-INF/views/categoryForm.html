<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리 등록 - Product Management</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { border-bottom: 2px solid #4a90d9; padding-bottom: 10px; color: #2c3e50; }
        .back-btn { display: inline-block; padding: 8px 16px; background: #6c757d; color: white; text-decoration: none; border-radius: 4px; margin-bottom: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 6px; color: #495057; }
        input[type="text"] {
            width: 100%; padding: 10px 12px; border: 1px solid #ced4da;
            border-radius: 4px; font-size: 1em; box-sizing: border-box;
        }
        input:focus { outline: none; border-color: #4a90d9; box-shadow: 0 0 0 3px rgba(74,144,217,0.15); }
        .btn-submit { background: #4a90d9; color: white; border: none; padding: 12px 32px; font-size: 1em; border-radius: 4px; cursor: pointer; }
        .btn-submit:hover { background: #357abd; }
        .required { color: #e74c3c; }
        footer { margin-top: 40px; padding: 12px 0; border-top: 1px solid #ddd; text-align: center; font-size: 0.85em; color: #666; }
    </style>
</head>
<body>

    <h1>카테고리 등록</h1>

    <a class="back-btn" th:href="@{/categories}">← 목록으로 돌아가기</a>

    <!--
        th:object="${categoryForm}": Controller에서 model.addAttribute("categoryForm", ...)로
        전달한 CategoryForm 객체와 폼 필드를 연결합니다.
    -->
    <form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">

        <div class="form-group">
            <label for="name">카테고리 이름 <span class="required">*</span></label>
            <!--
                th:field="*{name}": id="name", name="name", value="${categoryForm.name}" 자동 생성
            -->
            <input type="text" th:field="*{name}" placeholder="카테고리 이름"/>
            <!--
                th:errors="*{name}": BindingResult에 'name' 필드 오류(중복/공백)가 있으면
                해당 메시지를 표시합니다. 오류가 없으면 렌더링되지 않습니다.
            -->
            <span th:errors="*{name}" style="color:red"></span>
        </div>

        <div class="form-group">
            <button type="submit" class="btn-submit">등록</button>
        </div>

    </form>

    <footer>
        <p th:text="${'실습 수행: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss') + '  |  학번: 2191061  |  성명: 박지호'}"></p>
    </footer>

</body>
</html>
